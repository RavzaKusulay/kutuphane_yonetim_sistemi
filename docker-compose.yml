version: '3.8'

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: library_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: .
    ports:
      - "8000:8000"
    depends_on:
      - postgres
    environment:
      # Backend'in veritabanına bağlanırken kullanacağı adres (localhost yerine postgres servisi)
      - DATABASE_URL=postgresql://postgres:password@postgres:5432/library_db

volumes:
  postgres_data: